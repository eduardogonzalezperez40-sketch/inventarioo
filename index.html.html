<html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

h1,h2,.titulo{
    text-align:center;
}

.logo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.15;
    z-index:-1;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th,td{
    border:1px solid black;
    padding:5px;
    text-align:center;
}

th{
    background:black;
    color:white;
}

input,select,button{
    padding:5px;
    margin:3px;
}
</style>

</head>
<body>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRHwk-FDpCXUDXQDMqBZKxVXr8ERiUTO4ycsw&s" class="logo">

<h1>Inventario de Identificación de Equipos de Computo y Sistemas Computacionales</h1>

<h2>Colegio de Bachilleres del Estado de Mexico No 04</h2>

<h2 class="titulo" id="titulo">
Selecciona un departamento
</h2>

<select id="dep">
    <option value="">Selecciona Departamento</option>
    <option>Dirección y áreas administrativas</option>
    <option>Laboratorio de informática I</option>
    <option>Laboratorio de informática II</option>
    <option>Biblioteca</option>
</select>

<input type="text" id="departamento" placeholder="Departamento">
<input type="text" id="id" placeholder="ID">
<input type="text" id="comp" placeholder="Analisis de Computo">
<input type="text" id="sist" placeholder="Analisis de Sistemas">
<input type="text" id="mant" placeholder="Mantenimiento">
<input type="text" id="obs" placeholder="Observaciones">

<button onclick="agregar()" id="btn">
Agregar
</button>

<table>

<tr>
<th>ID</th>
<th>Departamento</th>
<th>Analisis de Computo</th>
<th>Analisis de Sistemas</th>
<th>Mantenimiento</th>
<th>Observaciones</th>
<th>Acciones</th>
</tr>

<tbody id="tabla"></tbody>

</table>

<script>

let datos=[];
let editarFila=-1;

dep.onchange=()=>{
    titulo.innerHTML=dep.value||"Selecciona un departamento";
    cargar();
};

function cargar(){

    datos=JSON.parse(
        localStorage.getItem("inventario_"+dep.value)
    )||[];

    mostrar();
}

function guardar(){

    localStorage.setItem(
        "inventario_"+dep.value,
        JSON.stringify(datos)
    );
}

function agregar(){

    if(dep.value==""){
        alert("Selecciona un departamento");
        return;
    }

    if(id.value==""){
        alert("Escribe un ID");
        return;
    }

    let registro={
        dep: departamento.value.trim() || dep.value,
        id:id.value,
        comp:comp.value,
        sist:sist.value,
        mant:mant.value,
        obs:obs.value
    };

    if(editarFila==-1){
        datos.push(registro);
    }else{
        datos[editarFila]=registro;
        editarFila=-1;
        btn.innerHTML="Agregar";
    }

    guardar();
    mostrar();

    departamento.value="";
    id.value="";
    comp.value="";
    sist.value="";
    mant.value="";
    obs.value="";
}

function mostrar(){

    tabla.innerHTML="";

    datos.forEach((d,i)=>{

        tabla.innerHTML+=`
        <tr>
            <td>${d.id}</td>
            <td>${d.dep}</td>
            <td>${d.comp}</td>
            <td>${d.sist}</td>
            <td>${d.mant}</td>
            <td>${d.obs}</td>
            <td>
                <button onclick="editar(${i})">Editar</button>
                <button onclick="eliminar(${i})">Eliminar</button>
            </td>
        </tr>
        `;
    });
}

function eliminar(i){

    datos.splice(i,1);

    guardar();
    mostrar();
}

function editar(i){

    let d=datos[i];

    departamento.value=d.dep;
    id.value=d.id;
    comp.value=d.comp;
    sist.value=d.sist;
    mant.value=d.mant;
    obs.value=d.obs;

    editarFila=i;

    btn.innerHTML="Guardar cambios";
}

</script>

</body>
</html>
